    let currentQuestions = [];
    const questionsPerQuiz = 20;

    window.onload = () => {
        document.getElementById('dbInfo').innerText = `題庫總數: ${allQuestions.length} 題`;
        generateNewQuiz();
    };

    function generateNewQuiz() {
        const form = document.getElementById('quizForm');
        form.innerHTML = '';
        document.getElementById('scoreDisplay').innerHTML = '未作答...';
        document.getElementById('scoreDisplay').style.backgroundColor = '#ecf0f1';
        document.getElementById('scoreDisplay').style.color = '#2c3e50';

        // Shuffle and pick
        const shuffled = [...allQuestions].sort(() => 0.5 - Math.random());
        currentQuestions = shuffled.slice(0, questionsPerQuiz);

        currentQuestions.forEach((qObj, index) => {
            const block = document.createElement('div');
            block.className = 'question-block';
            block.id = `qblock_${index}`;

            const title = document.createElement('div');
            title.className = 'question-title';
            title.innerText = `Q${index + 1}. ${qObj.q}`;
            block.appendChild(title);

            // Insert image if exists
            if(qObj.img) {
                const img = document.createElement('img');
                img.src = qObj.img;
                img.className = 'question-img';
                block.appendChild(img);
            }

            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';

            qObj.options.forEach((optText, optIndex) => {
                const label = document.createElement('label');
                label.id = `label_${index}_${optIndex}`;

                const input = document.createElement('input');
                input.type = 'radio';
                input.name = `q${index}`;
                input.value = optIndex;

                label.appendChild(input);
                label.appendChild(document.createTextNode(" " + optText));
                optionsDiv.appendChild(label);
            });

            block.appendChild(optionsDiv);

            const expDiv = document.createElement('div');
            expDiv.className = 'explanation';
            expDiv.id = `exp_${index}`;
            expDiv.innerHTML = `<strong>💡 答案與解析：</strong><br>${qObj.exp}`;
            block.appendChild(expDiv);

            form.appendChild(block);
        });

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function checkAnswers() {
        let score = 0;
        let answeredAll = true;

        currentQuestions.forEach((qObj, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const expDiv = document.getElementById(`exp_${index}`);

            expDiv.style.display = 'block';

            const correctLabel = document.getElementById(`label_${index}_${qObj.ans}`);
            correctLabel.classList.add('correct');

            if (selected) {
                const selectedVal = parseInt(selected.value);
                if (selectedVal === qObj.ans) {
                    score++;
                } else {
                    const wrongLabel = document.getElementById(`label_${index}_${selectedVal}`);
                    wrongLabel.classList.add('incorrect');
                }
            } else {
                answeredAll = false;
            }

            const inputs = document.querySelectorAll(`input[name="q${index}"]`);
            inputs.forEach(input => input.disabled = true);
        });

        const scoreDisplay = document.getElementById('scoreDisplay');
        if (!answeredAll) {
            scoreDisplay.style.color = '#856404';
            scoreDisplay.style.backgroundColor = '#ffeeba';
            scoreDisplay.innerHTML = `⚠️ 未答完！得 ${score} 分`;
        } else {
            const pass = score >= (currentQuestions.length * 0.75);
            scoreDisplay.style.color = pass ? '#155724' : '#721c24';
            scoreDisplay.style.backgroundColor = pass ? '#d4edda' : '#f8d7da';
            scoreDisplay.innerHTML = `🎯 總分: ${score} / ${currentQuestions.length}`;
        }
    }

    function resetQuiz() {
        document.getElementById('scoreDisplay').innerHTML = '未作答...';
        document.getElementById('scoreDisplay').style.backgroundColor = '#ecf0f1';
        document.getElementById('scoreDisplay').style.color = '#2c3e50';

        currentQuestions.forEach((qObj, index) => {
            const inputs = document.querySelectorAll(`input[name="q${index}"]`);
            inputs.forEach(input => {
                input.checked = false;
                input.disabled = false;
            });

            qObj.options.forEach((_, optIndex) => {
                const label = document.getElementById(`label_${index}_${optIndex}`);
                label.classList.remove('correct');
                label.classList.remove('incorrect');
            });

            document.getElementById(`exp_${index}`).style.display = 'none';
        });

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
